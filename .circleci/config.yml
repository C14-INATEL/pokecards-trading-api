version: 2.1

# Pokecards Trading API — CircleCI pipeline
# Job ownership:
#   - lint   → Gabriel Renato
#   - test   → Gabriel Baldoni
#   - build  → Ian
#   - deploy → Fábio
#   - notify → Fábio
#
# Workflows:
#   ci → runs lint/test/build on every branch EXCEPT main (features + dev + PRs)
#   cd → runs test/build/deploy/notify ONLY on main (after dev→main merge)
# With "Only build pull requests" enabled in the panel, CI runs on PRs.

executors:
  node-executor:
    docker:
      - image: cimg/node:22.11
    working_directory: ~/repo

jobs:
  # lint — Gabriel Renato
  lint:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-{{ checksum "package-lock.json" }}
            - node-deps-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: node-deps-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Run lint
          command: npm run lint

  # test — Gabriel Baldoni
  test:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - run:
          name: Generate Prisma Client
          command: npx prisma generate
      - run:
          name: Run unit tests
          command: npm run test -- --coverage
      - store_artifacts:
          path: coverage
          destination: test-coverage

  # build — Ian
  build:
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Generate Prisma Client
          command: npx prisma generate
      - run:
          name: Build project
          command: npm run build

  # deploy — Fábio
  deploy:
    executor: node-executor
    steps:
      - run:
          name: Validate deploy hook is configured
          command: |
            if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
              echo "ERROR: RENDER_DEPLOY_HOOK_URL is not set."
              exit 1
            fi
      - run:
          name: Trigger Render deploy
          command: |
            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "$RENDER_DEPLOY_HOOK_URL")
            echo "Render responded with HTTP $HTTP_CODE"
            cat /tmp/response.json || true
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "ERROR: Render returned a non-2xx status."
              exit 1
            fi
            echo "Deploy successfully triggered on Render."
  notify:
    executor: node-executor
    steps:
      - run:
          name: Pipeline status notification
          command: |
            echo "================================================"
            echo "✅ Pipeline da Pokecards Trading API concluída!"
            echo "Branch:  $CIRCLE_BRANCH"
            echo "Commit:  $CIRCLE_SHA1"
            echo "Autor:   $CIRCLE_USERNAME"
            echo "Build:   $CIRCLE_BUILD_URL"
            echo "================================================"

workflows:
  ci:
    jobs:
      - lint:
          filters:
            branches:
              ignore: main
      - test:
          requires: [lint]
          filters:
            branches:
              ignore: main
      - build:
          requires: [test]
          filters:
            branches:
              ignore: main
  cd:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - build:
          requires: [test]
          filters:
            branches:
              only: main
      - deploy:
          requires: [build]
          filters:
            branches:
              only: main
      - notify:
          requires: [deploy]
          filters:
            branches:
              only: main